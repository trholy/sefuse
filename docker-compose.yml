services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sefuse_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: sefuse_postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sefuse}
      - POSTGRES_USER=${POSTGRES_USER:-sefuse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sefuse}
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sefuse} -d ${POSTGRES_DB:-sefuse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    build: ./ollama
    container_name: sefuse_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama/data:/root/.ollama
    # ------------------------------
    # Uncomment NVIDIA_VISIBLE_DEVICES, NVIDIA_DRIVER_CAPABILITIES,
    # OLLAMA_NUM_CTX & gpus to use GPU for embedding processing.
    # ------------------------------
    environment:
      - MODEL=nomic-embed-text
      # - NVIDIA_VISIBLE_DEVICES=all
      # - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # - OLLAMA_NUM_CTX=2048
    # gpus: all

  fastapi:
    build: ./fastapi
    container_name: sefuse_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./data/funding_data:/app/data
      - ./data_processing/src:/app/data_processing
    depends_on:
      - qdrant
      - ollama
    environment:
      - MODEL=nomic-embed-text
      - TOKENIZER=nomic-ai/nomic-embed-text-v1.5
      - CRON_TRIGGER_GERMAN_DATA_PROCESSING=0
      - CRON_TRIGGER_GERMAN_EMBEDDING=3
      - CRON_TRIGGER_EU_DATA_PROCESSING=1
      - CRON_TRIGGER_EU_EMBEDDING=4
      - GERMAN_COLLECTION_NAME=fundings_german
      - EU_COLLECTION_NAME=fundings_eu
      - GERMAN_EXTRACTED_FILE_PATH=data/german_parquet_data_uuid.parquet
      - EU_EXTRACTED_FILE_PATH=data/eu_parquet_data_uuid.parquet
      - GERMAN_FUNDING_DATA_URL=https://foerderdatenbankdump.fra1.cdn.digitaloceanspaces.com/data/parquet_data.zip
      - EU_API_URL=https://api.tech.ec.europa.eu/search-api/prod/rest/search
      - EU_API_KEY=SEDIA
      - EU_PAGE_SIZE=50
      - EU_MAX_PAGES=100
      - EU_REQUEST_TIMEOUT_SECONDS=30
      - EU_PAGE_DELAY_SECONDS=0.2
      - OLLAMA_URL=http://ollama:11434
      - VECTOR_DB_HOST=qdrant
      - QDRANT_PORT=6333

  streamlit:
    build: ./streamlit
    container_name: sefuse_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data/funding_data:/app/data
    depends_on:
      - fastapi
    environment:
      - MODEL=nomic-embed-text
      - FASTAPI_URL=http://fastapi:8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-sefuse}
      - DB_USER=${POSTGRES_USER:-sefuse}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-sefuse}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me_admin}
